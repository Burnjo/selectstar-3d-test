<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelectStar — Interactive 3D Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0b0b0e;--surface:#141418;--text:#e6e2db;--muted:#6b6a74;--bronze:#c4895a;--bronze-light:#e8b88a;--bronze-dark:#8a5a32}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
  #c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
  .content{position:relative;z-index:1;pointer-events:none}
  section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:6vh 8vw}
  .tag{font-size:.7rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--bronze);margin-bottom:1.8rem;opacity:0;animation:fu .8s ease forwards .3s}
  .title{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,7vw,6rem);font-weight:900;line-height:1.02;letter-spacing:-.02em;max-width:700px;opacity:0;animation:fu .8s ease forwards .5s}
  .title em{font-style:italic;color:var(--bronze)}
  .sub{font-size:clamp(.95rem,1.4vw,1.15rem);font-weight:300;color:var(--muted);max-width:420px;margin-top:2rem;line-height:1.75;opacity:0;animation:fu .8s ease forwards .7s}
  section:nth-child(2){align-items:flex-end;text-align:right}
  section:nth-child(2) .sub{margin-left:auto}
  section:nth-child(3){align-items:center;text-align:center}
  @keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .shi{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:.5rem;transition:opacity .6s}
  .shi.h{opacity:0;pointer-events:none}
  .shi span{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .sl{width:1px;height:32px;background:var(--bronze-dark);position:relative;overflow:hidden}
  .sl::after{content:'';position:absolute;top:-100%;left:0;width:100%;height:100%;background:var(--bronze-light);animation:sp 1.8s ease-in-out infinite}
  @keyframes sp{0%{top:-100%}50%{top:100%}100%{top:100%}}
  .glow{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(196,137,90,.07) 0%,transparent 65%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .2s ease-out,top .2s ease-out}
  .lo{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .8s}
  .lo.done{opacity:0;pointer-events:none}
  .lbt{width:160px;height:2px;background:var(--surface);border-radius:1px;overflow:hidden}
  .lbf{height:100%;width:0%;background:var(--bronze);border-radius:1px;transition:width .3s}
  .lt{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
<div class="lo" id="lo"><div class="lbt"><div class="lbf" id="lb"></div></div><div class="lt">Loading 3D model</div></div>
<canvas id="c"></canvas>
<div class="glow" id="glow"></div>
<div class="content">
  <section>
    <div class="tag">Interactive 3D Experience</div>
    <h1 class="title">Select<em>Star</em></h1>
    <p class="sub">마우스를 움직여 로고와 상호작용해 보세요. 빛과 그림자가 실시간으로 반응합니다.</p>
  </section>
  <section>
    <div class="tag">Scroll to Explore</div>
    <h1 class="title" style="font-size:clamp(2rem,5vw,4rem)">스크롤로<br>시점을 <em>전환</em></h1>
    <p class="sub">페이지를 내리면 카메라가 자연스럽게 이동하며 다른 각도를 보여줍니다.</p>
  </section>
  <section>
    <div class="tag">glTF / GLB Format</div>
    <h1 class="title" style="font-size:clamp(2rem,5vw,4rem)">코드로 만드는<br><em>무한한</em> 가능성</h1>
    <p class="sub">Three.js + GLB 모델만으로 Spline 못지않은 인터랙티브 웹 경험을 구현할 수 있습니다.</p>
  </section>
</div>
<div class="shi" id="sh"><span>scroll</span><div class="sl"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(async()=>{
  class GLTFLoader{
    load(url,ok,prog,err){
      const l=new THREE.FileLoader(THREE.DefaultLoadingManager);
      l.setResponseType('arraybuffer');
      l.load(url,d=>{try{this.parse(d,ok,err)}catch(e){err?err(e):console.error(e)}},prog,err);
    }
    parse(data,ok,err){
      const dv=new DataView(data);
      if(dv.getUint32(0,true)!==0x46546C67){err(new Error('Not GLB'));return}
      const jl=dv.getUint32(12,true);
      const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(data,20,jl)));
      const bo=20+jl+8;
      const bin=new Uint8Array(data,bo);
      const bvs=gltf.bufferViews||[];
      const accs=gltf.accessors||[];
      const gad=(ai)=>{
        const a=accs[ai],bv=bvs[a.bufferView];
        const off=(bv.byteOffset||0)+(a.byteOffset||0);
        const ts={SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16}[a.type];
        const n=a.count*ts;
        if(a.componentType===5126)return new Float32Array(bin.buffer,bin.byteOffset+off,n);
        if(a.componentType===5123)return new Uint16Array(bin.buffer,bin.byteOffset+off,n);
        if(a.componentType===5125)return new Uint32Array(bin.buffer,bin.byteOffset+off,n);
        return new Float32Array(bin.buffer,bin.byteOffset+off,n);
      };
      const scene=new THREE.Group();
      const mats=gltf.materials||[];
      let mat;
      if(mats.length>0){
        const m=mats[0];
        const pbr=m.pbrMetallicRoughness||{};
        const bc=pbr.baseColorFactor||[0.76,0.54,0.35,1];
        mat=new THREE.MeshStandardMaterial({
          color:new THREE.Color(bc[0],bc[1],bc[2]),
          metalness:pbr.metallicFactor!==undefined?pbr.metallicFactor:1.0,
          roughness:pbr.roughnessFactor!==undefined?pbr.roughnessFactor:0.3,
          side:m.doubleSided?THREE.DoubleSide:THREE.FrontSide
        });
      }else{
        mat=new THREE.MeshStandardMaterial({color:0xc4895a,metalness:1.0,roughness:0.3});
      }
      const nodes=gltf.nodes||[];
      const meshes=gltf.meshes||[];
      nodes.forEach(node=>{
        if(node.mesh===undefined)return;
        const md=meshes[node.mesh];
        md.primitives.forEach(prim=>{
          const geo=new THREE.BufferGeometry();
          if(prim.attributes.POSITION!==undefined)
            geo.setAttribute('position',new THREE.BufferAttribute(gad(prim.attributes.POSITION),3));
          if(prim.attributes.NORMAL!==undefined)
            geo.setAttribute('normal',new THREE.BufferAttribute(gad(prim.attributes.NORMAL),3));
          if(prim.indices!==undefined)
            geo.setIndex(new THREE.BufferAttribute(gad(prim.indices),1));
          geo.computeBoundingBox();
          const mesh=new THREE.Mesh(geo,mat);
          if(node.translation)mesh.position.set(...node.translation);
          if(node.scale)mesh.scale.set(...node.scale);
          if(node.rotation)mesh.quaternion.set(node.rotation[0],node.rotation[1],node.rotation[2],node.rotation[3]);
          scene.add(mesh);
        });
      });
      const box=new THREE.Box3().setFromObject(scene);
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3());
      scene.position.sub(center);
      ok({scene,size});
    }
  }

  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.4;
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.setClearColor(0x0b0b0e,1);

  const scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x0b0b0e,0.04);

  const camera=new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,0.1,200);
  camera.position.set(0,2,8);

  scene.add(new THREE.AmbientLight(0x404060,0.5));

  const keyLight=new THREE.DirectionalLight(0xffe0c0,3);
  keyLight.position.set(5,8,5);
  scene.add(keyLight);

  const fillLight=new THREE.PointLight(0xc4895a,2.5,30);
  fillLight.position.set(-4,3,4);
  scene.add(fillLight);

  const rimLight=new THREE.PointLight(0x6e8aaf,1.8,25);
  rimLight.position.set(3,-2,-5);
  scene.add(rimLight);

  const topLight=new THREE.PointLight(0xffeedd,1.2,20);
  topLight.position.set(0,8,0);
  scene.add(topLight);

  const bottomLight=new THREE.PointLight(0xc4895a,0.8,15);
  bottomLight.position.set(0,-4,3);
  scene.add(bottomLight);

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(40,40),
    new THREE.MeshStandardMaterial({color:0x0b0b0e,roughness:0.7,metalness:0.3})
  );
  ground.rotation.x=-Math.PI/2;
  ground.position.y=-3;
  scene.add(ground);

  let modelGroup=null;
  const lb=document.getElementById('lb');

  new GLTFLoader().load(
    'selectstar_logo_002_metal.glb',
    result=>{
      modelGroup=result.scene;
      const s=result.size;
      const maxDim=Math.max(s.x,s.y,s.z);
      const scale=5/maxDim;
      modelGroup.scale.setScalar(scale);
      modelGroup.rotation.x=-Math.PI/2;
      scene.add(modelGroup);
      lb.style.width='100%';
      setTimeout(()=>document.getElementById('lo').classList.add('done'),400);
    },
    xhr=>{if(xhr.total){lb.style.width=Math.round(xhr.loaded/xhr.total*90)+'%'}},
    e=>console.error('Load error:',e)
  );

  const mouse={x:0,y:0,tx:0,ty:0};
  document.addEventListener('mousemove',e=>{
    mouse.tx=(e.clientX/window.innerWidth)*2-1;
    mouse.ty=-(e.clientY/window.innerHeight)*2+1;
    const g=document.getElementById('glow');
    g.style.left=e.clientX+'px';
    g.style.top=e.clientY+'px';
  });
  document.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    mouse.tx=(t.clientX/window.innerWidth)*2-1;
    mouse.ty=-(t.clientY/window.innerHeight)*2+1;
  });

  let sp=0;
  window.addEventListener('scroll',()=>{
    const max=document.body.scrollHeight-window.innerHeight;
    sp=max>0?window.scrollY/max:0;
    document.getElementById('sh').classList.toggle('h',sp>0.04);
  });

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  const clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    mouse.x+=(mouse.tx-mouse.x)*0.04;
    mouse.y+=(mouse.ty-mouse.y)*0.04;

    const ca=sp*Math.PI*0.8-0.2;
    const cr=8-sp*2;
    const ch=2+sp*1.5;
    camera.position.x=Math.sin(ca)*cr+mouse.x*1.2;
    camera.position.z=Math.cos(ca)*cr;
    camera.position.y=ch+mouse.y*0.6;
    camera.lookAt(0,0.3,0);

    if(modelGroup){
      modelGroup.rotation.z=t*0.15+mouse.x*0.4;
      modelGroup.rotation.x=-Math.PI/2+Math.sin(t*0.3)*0.05+mouse.y*0.15;
      modelGroup.position.y=Math.sin(t*0.6)*0.08;
    }

    keyLight.position.x=5+mouse.x*4;
    keyLight.position.y=8+mouse.y*2;
    fillLight.position.x=-4+mouse.x*3;
    fillLight.position.z=4+mouse.y*2;
    fillLight.intensity=2.5+sp*1.5;
    topLight.intensity=1.2+Math.sin(t*0.5)*0.3;

    renderer.render(scene,camera);
  }
  animate();
})();
</script>
</body>
</html>
