<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelectStar — Interactive 3D Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0b0e;
    --surface: #141418;
    --text: #e6e2db;
    --muted: #6b6a74;
    --bronze: #c4895a;
    --bronze-light: #e8b88a;
    --bronze-dark: #8a5a32;
    --glow: rgba(196, 137, 90, 0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6vh 8vw;
  }

  .hero-tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--bronze);
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 1.02;
    letter-spacing: -0.02em;
    max-width: 700px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  .hero-title em {
    font-style: italic;
    color: var(--bronze);
  }

  .hero-sub {
    font-size: clamp(0.95rem, 1.4vw, 1.15rem);
    font-weight: 300;
    color: var(--muted);
    max-width: 420px;
    margin-top: 2rem;
    line-height: 1.75;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  section:nth-child(2) {
    align-items: flex-end;
    text-align: right;
  }
  section:nth-child(2) .hero-sub { margin-left: auto; }

  section:nth-child(3) {
    align-items: center;
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scroll-indicator {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    transition: opacity 0.6s;
  }

  .scroll-indicator.hidden { opacity: 0; pointer-events: none; }

  .scroll-indicator span {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .scroll-line {
    width: 1px;
    height: 32px;
    background: var(--bronze-dark);
    position: relative;
    overflow: hidden;
  }

  .scroll-line::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bronze-light);
    animation: scrollPulse 1.8s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0% { top: -100%; }
    50% { top: 100%; }
    100% { top: 100%; }
  }

  .cursor-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    transition: left 0.2s ease-out, top 0.2s ease-out;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    transition: opacity 0.8s ease;
  }

  .loading-overlay.done {
    opacity: 0;
    pointer-events: none;
  }

  .loading-bar-track {
    width: 160px;
    height: 2px;
    background: var(--surface);
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--bronze);
    border-radius: 1px;
    transition: width 0.3s ease;
  }

  .loading-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="loading-bar-track"><div class="loading-bar-fill" id="loadBar"></div></div>
  <div class="loading-text">Loading 3D model</div>
</div>

<canvas id="three-canvas"></canvas>
<div class="cursor-glow" id="glow"></div>

<div class="content">
  <section>
    <div class="hero-tag">Interactive 3D Experience</div>
    <h1 class="hero-title">Select<em>Star</em></h1>
    <p class="hero-sub">마우스를 움직여 로고와 상호작용해 보세요. 빛과 그림자가 실시간으로 반응합니다.</p>
  </section>

  <section>
    <div class="hero-tag">Scroll to Explore</div>
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,4rem)">스크롤로<br>시점을 <em>전환</em></h1>
    <p class="hero-sub">페이지를 내리면 카메라가 자연스럽게 이동하며 다른 각도를 보여줍니다.</p>
  </section>

  <section>
    <div class="hero-tag">glTF / GLB Format</div>
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,4rem)">코드로 만드는<br><em>무한한</em> 가능성</h1>
    <p class="hero-sub">Three.js + GLB 모델만으로 Spline 못지않은 인터랙티브 웹 경험을 구현할 수 있습니다.</p>
  </section>
</div>

<div class="scroll-indicator" id="scrollHint">
  <span>scroll</span>
  <div class="scroll-line"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(async () => {
  // ── GLTFLoader (inline, r128 compatible) ──
  class GLTFLoader {
    constructor() { this.manager = THREE.DefaultLoadingManager; }
    load(url, onLoad, onProgress, onError) {
      const loader = new THREE.FileLoader(this.manager);
      loader.setResponseType('arraybuffer');
      loader.load(url, (data) => {
        try { this.parse(data, '', onLoad, onError); }
        catch(e) { if(onError) onError(e); else console.error(e); }
      }, onProgress, onError);
    }
    parse(data, path, onLoad, onError) {
      const dv = new DataView(data);
      const magic = dv.getUint32(0, true);
      if (magic !== 0x46546C67) { onError(new Error('Not a GLB')); return; }
      const jsonLen = dv.getUint32(12, true);
      const jsonText = new TextDecoder().decode(new Uint8Array(data, 20, jsonLen));
      const gltf = JSON.parse(jsonText);
      const binOffset = 20 + jsonLen + 8;
      const binData = new Uint8Array(data, binOffset);

      const bufferViews = gltf.bufferViews || [];
      const accessors = gltf.accessors || [];

      const getAccessorData = (accIdx) => {
        const acc = accessors[accIdx];
        const bv = bufferViews[acc.bufferView];
        const offset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        const count = acc.count;
        const typeSize = { SCALAR:1, VEC2:2, VEC3:3, VEC4:4, MAT4:16 }[acc.type];
        const totalElems = count * typeSize;
        if (acc.componentType === 5126) return new Float32Array(binData.buffer, binData.byteOffset + offset, totalElems);
        if (acc.componentType === 5123) return new Uint16Array(binData.buffer, binData.byteOffset + offset, totalElems);
        if (acc.componentType === 5125) return new Uint32Array(binData.buffer, binData.byteOffset + offset, totalElems);
        return new Float32Array(binData.buffer, binData.byteOffset + offset, totalElems);
      };

      // Build meshes
      const scene = new THREE.Group();
      const nodes = gltf.nodes || [];
      const meshes = gltf.meshes || [];
      const materials = gltf.materials || [];

      // Create material from first gltf material
      let threeMat;
      if (materials.length > 0) {
        const m = materials[0];
        const pbr = m.pbrMetallicRoughness || {};
        const baseColor = pbr.baseColorFactor || [1,1,1,1];
        threeMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(baseColor[0], baseColor[1], baseColor[2]),
          metalness: pbr.metallicFactor !== undefined ? pbr.metallicFactor : 0.9,
          roughness: pbr.roughnessFactor !== undefined ? pbr.roughnessFactor : 0.15,
        });
      } else {
        threeMat = new THREE.MeshStandardMaterial({ color: 0xc4895a, metalness: 0.9, roughness: 0.15 });
      }

      nodes.forEach((node) => {
        if (node.mesh === undefined) return;
        const meshDef = meshes[node.mesh];
        meshDef.primitives.forEach((prim) => {
          const geo = new THREE.BufferGeometry();
          if (prim.attributes.POSITION !== undefined) {
            geo.setAttribute('position', new THREE.BufferAttribute(getAccessorData(prim.attributes.POSITION), 3));
          }
          if (prim.attributes.NORMAL !== undefined) {
            geo.setAttribute('normal', new THREE.BufferAttribute(getAccessorData(prim.attributes.NORMAL), 3));
          }
          if (prim.indices !== undefined) {
            geo.setIndex(new THREE.BufferAttribute(getAccessorData(prim.indices), 1));
          }
          const mesh = new THREE.Mesh(geo, threeMat);
          if (node.translation) mesh.position.set(...node.translation);
          if (node.scale) mesh.scale.set(...node.scale);
          if (node.rotation) mesh.quaternion.set(...node.rotation);
          scene.add(mesh);
        });
      });

      // Center the model
      const box = new THREE.Box3().setFromObject(scene);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      scene.position.sub(center);

      onLoad({ scene, box, size });
    }
  }

  // ── Renderer ──
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.setClearColor(0x0b0b0e, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0b0b0e, 0.06);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 2, 8);

  // ── Lights ──
  scene.add(new THREE.AmbientLight(0x404060, 0.4));

  const keyLight = new THREE.DirectionalLight(0xffe0c0, 2.5);
  keyLight.position.set(5, 8, 5);
  scene.add(keyLight);

  const fillLight = new THREE.PointLight(0xc4895a, 2, 30);
  fillLight.position.set(-4, 3, 4);
  scene.add(fillLight);

  const rimLight = new THREE.PointLight(0x6e8aaf, 1.5, 25);
  rimLight.position.set(3, -2, -5);
  scene.add(rimLight);

  const topLight = new THREE.PointLight(0xffeedd, 1, 20);
  topLight.position.set(0, 8, 0);
  scene.add(topLight);

  // Ground reflection hint
  const groundGeo = new THREE.PlaneGeometry(40, 40);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0b0b0e, roughness: 0.7, metalness: 0.3
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.5;
  scene.add(ground);

  // ── Load Model ──
  let modelGroup = null;
  let modelSize = 1;
  const loadBar = document.getElementById('loadBar');

  const loader = new GLTFLoader();
  loader.load(
    'selectstar_logo_002_metal.glb',
    (result) => {
      modelGroup = result.scene;
      const s = result.size;
      modelSize = Math.max(s.x, s.y, s.z);
      const scale = 4 / modelSize;
      modelGroup.scale.setScalar(scale);
      scene.add(modelGroup);

      loadBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loader').classList.add('done');
      }, 400);
    },
    (xhr) => {
      if (xhr.total) {
        const pct = Math.round(xhr.loaded / xhr.total * 90);
        loadBar.style.width = pct + '%';
      }
    },
    (err) => { console.error('Load error:', err); }
  );

  // ── Mouse ──
  const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  document.addEventListener('mousemove', (e) => {
    mouse.tx = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.ty = -(e.clientY / window.innerHeight) * 2 + 1;
    document.getElementById('glow').style.left = e.clientX + 'px';
    document.getElementById('glow').style.top = e.clientY + 'px';
  });

  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouse.tx = (t.clientX / window.innerWidth) * 2 - 1;
    mouse.ty = -(t.clientY / window.innerHeight) * 2 + 1;
  });

  // ── Scroll ──
  let scrollProg = 0;
  window.addEventListener('scroll', () => {
    const max = document.body.scrollHeight - window.innerHeight;
    scrollProg = max > 0 ? window.scrollY / max : 0;
    const hint = document.getElementById('scrollHint');
    if (scrollProg > 0.04) hint.classList.add('hidden');
    else hint.classList.remove('hidden');
  });

  // ── Resize ──
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Animate ──
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Smooth mouse
    mouse.x += (mouse.tx - mouse.x) * 0.04;
    mouse.y += (mouse.ty - mouse.y) * 0.04;

    // Camera orbit based on scroll
    const camAngle = scrollProg * Math.PI * 0.8 - 0.2;
    const camRadius = 8 - scrollProg * 2;
    const camHeight = 2 + scrollProg * 1.5;
    camera.position.x = Math.sin(camAngle) * camRadius + mouse.x * 1.2;
    camera.position.z = Math.cos(camAngle) * camRadius;
    camera.position.y = camHeight + mouse.y * 0.6;
    camera.lookAt(0, 0.3, 0);

    // Model gentle auto-rotation + mouse tilt
    if (modelGroup) {
      modelGroup.rotation.y = t * 0.15 + mouse.x * 0.4;
      modelGroup.rotation.x = Math.sin(t * 0.3) * 0.05 + mouse.y * 0.15;
      modelGroup.position.y = Math.sin(t * 0.6) * 0.08;
    }

    // Lights react to mouse
    keyLight.position.x = 5 + mouse.x * 4;
    keyLight.position.y = 8 + mouse.y * 2;
    fillLight.position.x = -4 + mouse.x * 3;
    fillLight.position.z = 4 + mouse.y * 2;

    // Bronze glow intensity based on scroll
    fillLight.intensity = 2 + scrollProg * 1.5;
    topLight.intensity = 1 + Math.sin(t * 0.5) * 0.3;

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
